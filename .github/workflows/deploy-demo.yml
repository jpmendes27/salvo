name: Deploy → Demo (Firebase Hosting)

on:
  push:
    branches: [demo]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (demo — sem basePath)
        run: npm run build:demo
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.DEMO_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.DEMO_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.DEMO_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.DEMO_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEMO_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.DEMO_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FUNCTIONS_URL: ${{ secrets.DEMO_FUNCTIONS_URL }}
          NEXT_PUBLIC_SEND_EMAIL_URL: ${{ secrets.DEMO_SEND_EMAIL_URL }}

      - name: Deploy para Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.DEMO_FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.DEMO_FIREBASE_PROJECT_ID }}
          channelId: live
