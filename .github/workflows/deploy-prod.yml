name: Deploy → Produção (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (prod — basePath /salvo)
        run: npm run build:prod
        env:
          NEXT_PUBLIC_BASE_PATH: /salvo
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.PROD_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FUNCTIONS_URL: ${{ secrets.PROD_FUNCTIONS_URL }}
          NEXT_PUBLIC_SEND_EMAIL_URL: ${{ secrets.PROD_SEND_EMAIL_URL }}
          NEXT_PUBLIC_SUGGEST_GOAL_URL: ${{ secrets.PROD_SUGGEST_GOAL_URL }}

      - name: Add .nojekyll (evita que GitHub Pages ignore pastas _next)
        run: touch out/.nojekyll

      - name: Generate Firebase auth handler (404.html for /__/auth/handler)
        run: |
          python3 << 'EOF'
          import os
          tmpl = open('scripts/firebase-auth-handler.html').read()
          html = (tmpl
            .replace('__FIREBASE_API_KEY__',             os.environ['FIREBASE_API_KEY'])
            .replace('__FIREBASE_PROJECT_ID__',          os.environ['FIREBASE_PROJECT_ID'])
            .replace('__FIREBASE_STORAGE_BUCKET__',      os.environ['FIREBASE_STORAGE_BUCKET'])
            .replace('__FIREBASE_MESSAGING_SENDER_ID__', os.environ['FIREBASE_MESSAGING_SENDER_ID'])
            .replace('__FIREBASE_APP_ID__',              os.environ['FIREBASE_APP_ID'])
          )
          open('out/404.html', 'w').write(html)
          EOF
        env:
          FIREBASE_API_KEY: ${{ secrets.PROD_FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.PROD_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.PROD_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.PROD_FIREBASE_APP_ID }}

      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: .
          keep_files: false
